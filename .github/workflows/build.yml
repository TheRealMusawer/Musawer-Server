name: Build Backend Plugin

on:
  push:
    branches:
      - main
      - entry-proxy
      - backendstatus
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
          cache: gradle

      - name: Build with system Gradle
        run: gradle clean build --stacktrace

      - name: Upload built JAR
        uses: actions/upload-artifact@v4
        with:
          name: backendstatus-jar
          path: build/libs/*.jar
          retention-days: 30
