plugins {
    id 'java'
}

group = 'com.galactic'
version = '1.0'

repositories {
    mavenCentral()
}

dependencies {
    compileOnly 'com.velocitypowered:velocity-api:3.1.1'
    annotationProcessor 'com.velocitypowered:velocity-api:3.1.1'
}

java {
    toolchain {
        languageVersion = JavaLanguageVersion.of(17)
    }
}
