config-version = "2.6"

bind = "0.0.0.0:25565"
motd = "<gold>Galactic Network <gray>- <white>Connecting..."
show-max-players = 1000
online-mode = true
player-info-forwarding-mode = "modern"
forwarding-secret-file = "forwarding.secret"

[servers]
lobby = "backend-1:25565"

try = [ "lobby" ]

[forced-hosts]
"galactic-server.onrender.com" = [ "lobby" ]

[advanced]
tcp-fast-open = true
bungee-plugin-message-channel = true
