# Config version. Do not change this
config-version = "2.7"

# Entry proxy bind port (Render)
bind = "0.0.0.0:25567"

# MOTD
motd = "<#09add3>Galactic Entry Proxy"

# Max players shown
show-max-players = 5000

# Eaglercraft = offline mode
online-mode = false
force-key-authentication = false
prevent-client-proxy-connections = false

# MUST be modern for Velocity → Velocity networks
player-info-forwarding-mode = "modern"

# Forwarding secret file (must exist in same folder)
forwarding-secret-file = "forwarding.secret"

announce-forge = false
kick-existing-players = false

# No ping passthrough
ping-passthrough = "disabled"
sample-players-in-ping = false
enable-player-address-logging = true

###############################################
# BACKEND SERVERS (your 7 Eagler servers)
###############################################

[servers]
p1 = "bachi-eagler.onrender.com:443"
p2 = "abdullo-eagler.onrender.com:443"
p3 = "leon-eagler.onrender.com:443"
p4 = "oneil-eagler.onrender.com:443"
p5 = "ahmad-eagler.onrender.com:443"
p6 = "fahad-eagler.onrender.com:443"
p7 = "azan-eagler.onrender.com:443"

# Try order (plugin overrides this anyway)
try = [
    "p1",
    "p2",
    "p3",
    "p4",
    "p5",
    "p6",
    "p7"
]

###############################################
# Forced hosts (not used but kept clean)
###############################################
[forced-hosts]
"galactic.example.com" = [
    "p1"
]

###############################################
# Advanced settings
###############################################
[advanced]
compression-threshold = 256
compression-level = -1
login-ratelimit = 3000
connection-timeout = 5000
read-timeout = 30000
haproxy-protocol = false
tcp-fast-open = false
bungee-plugin-message-channel = true
show-ping-requests = false
failover-on-unexpected-server-disconnect = true
announce-proxy-commands = true
log-command-executions = false
log-player-connections = true
accepts-transfers = false
enable-reuse-port = false
command-rate-limit = 50
forward-commands-if-rate-limited = true
kick-after-rate-limited-commands = 0
tab-complete-rate-limit = 10
kick-after-rate-limited-tab-completes = 0

###############################################
# Query settings
###############################################
[query]
enabled = false
port = 25565
map = "Velocity"
show-plugins = false

###############################################
# Plugin message forwarding
###############################################
[plugin-message-forwarding]
enabled = true
channels = [
  "eagler:below_y0"
]
